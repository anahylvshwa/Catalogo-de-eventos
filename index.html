<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cartelera de Eventos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <article class="card">
        <div class="badge">Evento Especial</div>
        <h1>un catálogo interactivo<br />de Eventos</h1>
        <p class="description">
          Podrás observar la ista de eventos y conciertos!
        </p>
        <div class="info-row">
          <div class="info-item">
            <span>Fecha</span>
            <strong>24 Marzo</strong>
          </div>
          <div class="info-item">
            <span>Lugar</span>
            <strong>Costa 21</strong>
          </div>
          <div class="info-item">
            <span>Cupos</span>
            <strong>100</strong>
          </div>
        </div>
        <h3>Catalogo</h3>
        <div class="catalog-grid"></div>

        <!-- Modal  -->
        <div id="movieModal" class="modal hidden">
          <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
              <div class="modal-image">
                <img id="modalImage" src="" alt="" />
              </div>
              <div class="modal-details">
                <h2 id="modalDescription"></h2>
              </div>
            </div>
          </div>
        </div>
      </article>
    </main>
    <footer>
      <p>Copyright © 2026</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
